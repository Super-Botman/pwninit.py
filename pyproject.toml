[build-system]
requires = ["hatchling", "pwntools", "argparse", "readelf"]
build-backend = "hatchling.build"

[project]
name = "pwninit.py_0xb0tm4n"
version = "0.0.1"
authors = [
  { name="0xb0tm4n", email="0xb0tm4n@proton.me" },
]
description = "A pwninit script"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]


[project.scripts]
pwninit = "pwninit.cli:main"

[project.urls]
Homepage = "https://github.com/0xb0tm4n/pwninit.py"
Issues = "https://github.com/0xb0tm4n/pwninit.py"
